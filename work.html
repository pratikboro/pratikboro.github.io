<!DOCTYPE html>
<html>
<head>

<title>Work – Pratik Boro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:linear-gradient(120deg,#f5f5f7,#e9ecff,#ffe6f2);

background-size:400% 400%;

animation:bgFlow 18s ease infinite;

color:#111;

min-height:100vh;

}

/* flowing gradient */

@keyframes bgFlow{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* NAVBAR */

nav{

display:flex;
justify-content:space-between;
align-items:center;

padding:26px 8%;

}

.logo{
font-weight:600;
font-size:1.1rem;
}

.nav-links{

display:flex;
gap:25px;

}

.nav-links a{

text-decoration:none;
color:#444;

padding:10px 18px;

border-radius:30px;

transition:0.35s;

}

/* liquid glass hover */

.nav-links a:hover{

background:rgba(255,255,255,0.35);

backdrop-filter:blur(12px);

box-shadow:

inset 0 1px 2px rgba(255,255,255,0.7),

0 8px 20px rgba(0,0,0,0.1);

}

/* PAGE TITLE */

.header{

text-align:center;

padding-top:120px;

}

.header h1{

font-size:clamp(2.5rem,5vw,3.5rem);

letter-spacing:-1px;

}

/* PROJECT GRID */

.projects{

padding:80px 10%;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:40px;

}

/* LIQUID GLASS CARDS */

.project-card{

background:rgba(255,255,255,0.45);

backdrop-filter:blur(16px);

border-radius:20px;

overflow:hidden;

box-shadow:0 12px 30px rgba(0,0,0,0.08);

transition:0.4s;

text-decoration:none;

color:#111;

}

.project-card:hover{

transform:translateY(-12px) scale(1.02);

box-shadow:0 20px 50px rgba(0,0,0,0.15);

}

.project-card img{

width:100%;

display:block;

}

.project-info{

padding:22px;

}

.project-info h3{

font-size:1.3rem;

margin-bottom:6px;

}

.project-info p{

color:#666;

font-size:0.95rem;

}

/* MOBILE */

@media(max-width:768px){

nav{

flex-direction:column;

gap:15px;

}

.header{

padding-top:80px;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">Pratik Boro</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="work.html">Work</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

</div>

</nav>


<div class="header">

<h1>Selected Work</h1>

</div>


<section class="projects">

<a href="projects/project1.html" class="project-card">

<img src="https://picsum.photos/600/400">

<div class="project-info">

<h3>Brand Identity</h3>

<p>Minimal branding concept</p>

</div>

</a>


<a href="projects/project2.html" class="project-card">

<img src="https://picsum.photos/600/401">

<div class="project-info">

<h3>Mobile App UI</h3>

<p>Clean interface design</p>

</div>

</a>

</section>

</body>
</html>
