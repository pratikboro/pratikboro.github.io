<!DOCTYPE html>
<html>
<head>

<title>Pratik Boro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:linear-gradient(
120deg,
#f5f5f7,
#e9ecff,
#ffe6f2,
#e8f7ff
);

background-size:500% 500%;

animation:bgFlow 35s ease-in-out infinite;

color:#111;

min-height:100vh;

}

/* smooth gradient flow */

@keyframes bgFlow{

0%{background-position:0% 50%;}
25%{background-position:50% 100%;}
50%{background-position:100% 50%;}
75%{background-position:50% 0%;}
100%{background-position:0% 50%;}

}

/* NAVBAR */

nav{

display:flex;
justify-content:space-between;
align-items:center;

padding:26px 8%;

}

.logo{
font-weight:600;
font-size:1.1rem;
}

.nav-links{

display:flex;
gap:25px;

}

/* magnifying glass hover */

.nav-links a{

text-decoration:none;
color:#444;

padding:10px 18px;

border-radius:30px;

transition:all 0.35s ease;

}

.nav-links a:hover{

background:rgba(255,255,255,0.25);

backdrop-filter:blur(14px) saturate(180%);
-webkit-backdrop-filter:blur(14px) saturate(180%);

border:1px solid rgba(255,255,255,0.4);

box-shadow:

0 10px 25px rgba(0,0,0,0.08),
inset 0 1px 1px rgba(255,255,255,0.6);

transform:scale(1.08);

}

/* HERO */

.hero{

min-height:85vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:0 20px;

}

.hero h1{

font-size:clamp(3rem,6vw,4.5rem);

letter-spacing:-1px;

margin-bottom:20px;

}

.subtitle{

max-width:600px;

font-size:1.2rem;

color:#555;

}

/* glass button */

.btn{

margin-top:45px;

padding:14px 36px;

border-radius:40px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,0.6);

text-decoration:none;

color:#111;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

transition:0.3s;

}

.btn:hover{

transform:translateY(-4px) scale(1.05);

box-shadow:0 15px 40px rgba(0,0,0,0.15);

}

/* footer */

footer{

text-align:center;

padding:40px;

color:#888;

font-size:14px;

}

/* mobile */

@media(max-width:768px){

nav{
flex-direction:column;
gap:15px;
}

.hero h1{
font-size:2.5rem;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">Pratik Boro</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="work.html">Work</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

</div>

</nav>


<section class="hero">

<h1>Design with Clarity.</h1>

<p class="subtitle">

Minimal, thoughtful visual experiences crafted by designer Pratik Boro.

</p>

<a href="work.html" class="btn">View Work</a>

</section>


<footer>

© 2026 Pratik Boro

</footer>

</body>
</html>
