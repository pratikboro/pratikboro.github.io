<!DOCTYPE html>
<html>
<head>
<title>Pratik Boro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
color:#111;
line-height:1.6;
min-height:100vh;
overflow-x:hidden;

background:
radial-gradient(circle at 20% 20%,#ffffff 0%,#f3f3f5 40%,#e8e8ed 100%);
}

/* ===== BACKGROUND BLOBS ===== */

.bg-blob{
position:absolute;
filter:blur(120px);
opacity:0.5;
z-index:-1;
}

.blob1{
width:500px;
height:500px;
background:#cfd9ff;
top:-100px;
left:-100px;
}

.blob2{
width:500px;
height:500px;
background:#ffd6e7;
bottom:-150px;
right:-150px;
}

/* ===== NAVBAR ===== */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
font-size:14px;
letter-spacing:1px;
}

.logo{
font-weight:600;
}

.nav-links{
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
color:#666;
transition:0.25s;
}

nav a:hover{
color:#000;
}

/* ===== HERO ===== */

.hero{
min-height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 20px;
}

h1{
font-size:clamp(2.4rem,5vw,4rem);
font-weight:600;
margin-bottom:20px;
letter-spacing:-1px;
}

.subtitle{
font-size:clamp(1rem,2vw,1.2rem);
color:#555;
max-width:620px;
}

/* ===== GLASS BUTTON ===== */

.btn{
position:relative;
margin-top:40px;
padding:14px 40px;
border-radius:40px;

background:rgba(255,255,255,0.35);
backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,0.6);

text-decoration:none;
color:#111;
font-weight:500;

box-shadow:
inset 0 1px 2px rgba(255,255,255,0.9),
0 10px 35px rgba(0,0,0,0.1);

transition:all 0.35s ease;

overflow:hidden;
}

/* glass shine */

.btn::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.7),
transparent
);
transition:0.6s;
}

.btn:hover::after{
left:120%;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:
inset 0 1px 2px rgba(255,255,255,1),
0 20px 50px rgba(0,0,0,0.18);
}

/* ===== FOOTER ===== */

footer{
text-align:center;
padding:40px 20px;
font-size:13px;
color:#999;
}

/* ===== MOBILE ===== */

@media (max-width:768px){

nav{
flex-direction:column;
gap:15px;
padding:20px;
}

.nav-links{
flex-direction:column;
gap:15px;
}

.hero{
padding:70px 20px;
}

}

</style>
</head>

<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>

<nav>

<div class="logo">Pratik Boro</div>

<div class="nav-links">
<a href="#">Work</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

</nav>

<section class="hero">

<h1>Design with Clarity.</h1>

<p class="subtitle">
I create minimal, thoughtful and modern visual experiences.
Graphic Designer exploring digital product design and development.
</p>

<a href="#" class="btn">View Projects</a>

</section>

<footer>
© 2026 Pratik Boro
</footer>

</body>
</html>
